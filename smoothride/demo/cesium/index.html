<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='7' fill='%2334d399'/></svg>" />
  <title>Nomos — 3D San Francisco</title>

  <!-- Official Cesium CDN; CESIUM_BASE_URL must be set before Cesium.js loads. -->
  <script>window.CESIUM_BASE_URL = "https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/";</script>
  <script src="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.124/Build/Cesium/Widgets/widgets.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />

  <style>
    html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #msg { position: absolute; inset: 0; display: none; align-items: center; justify-content: center;
      background: #0b0e13; color: #e7ecf3; font-family: -apple-system, system-ui, sans-serif; text-align: center; }
    #msg[data-show] { display: flex; }
    #msg code { background: #1b2230; padding: 2px 6px; border-radius: 5px; }
  </style>
</head>
<body>
  <div id="cesiumContainer"></div>

  <!-- telemetry dashboard (populated by app.js on every clock tick) -->
  <div id="dash">
    <div class="d-h"><span class="d-t">Nomos · telemetry</span><span class="d-live"><i></i>LIVE</span></div>

    <div class="card d-scene">
      <div class="ct">Policy checkpoint</div>
      <select id="scene-select"></select>
    </div>

    <div class="d-k">
      <div class="kpi"><span class="l">Trips done</span><b id="m-trips" class="ok">0</b></div>
      <div class="kpi"><span class="l">Moving</span><b id="m-moving">0</b></div>
      <div class="kpi"><span class="l">Crashes</span><b id="m-crashes" class="bad">0</b></div>
      <div class="kpi"><span class="l">Avg speed</span><b id="m-speed">0 mph</b></div>
    </div>

    <div class="card">
      <div class="ct">Cumulative trips</div>
      <canvas id="dc-trips" height="60"></canvas>
    </div>
    <div class="card">
      <div class="ct">Fleet status over time
        <span class="lg"><i style="background:#34d399"></i>moving <i style="background:#f59e0b"></i>slowed <i style="background:#ef4444"></i>crashed</span>
      </div>
      <canvas id="dc-fleet" height="54"></canvas>
    </div>
    <div class="card">
      <div class="ct">Speed distribution · now <span class="lg" id="dc-hn"></span></div>
      <canvas id="dc-hist" height="52"></canvas>
    </div>
    <div class="card">
      <div class="fb"><span>moving</span><div class="bar"><i id="fb-mov" style="background:#34d399"></i></div><b id="fbn-mov">0</b></div>
      <div class="fb"><span>slowed</span><div class="bar"><i id="fb-jam" style="background:#f59e0b"></i></div><b id="fbn-jam">0</b></div>
      <div class="fb"><span>crashed</span><div class="bar"><i id="fb-crash" style="background:#ef4444"></i></div><b id="fbn-crash">0</b></div>
    </div>
    <div class="d-foot"><b id="m-cars">0</b> cars · <b id="m-peds">0</b> peds · <b id="m-time">0s</b> · traffic signals: <b class="ok">0</b></div>
  </div>

  <div id="msg"></div>
  <script src="config.js" onerror="window.__noConfig=true"></script>
  <script src="cesium-murals.js"></script>
  <script src="app.js"></script>
</body>
</html>
