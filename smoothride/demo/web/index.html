<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SmoothRide — a trafficless San Francisco</title>

  <!-- deck.gl + mapbox-gl from CDN (pinned) -->
  <script src="https://unpkg.com/deck.gl@9.0.27/dist.min.js"></script>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.4.0/mapbox-gl.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="map"></div>
  <canvas id="deck-canvas"></canvas>

  <div id="title">
    <div class="big">SmoothRide</div>
    <div class="sub">Multi-agent RL coordination on the real San&nbsp;Francisco grid · WheeledLab cars</div>
  </div>

  <div id="hud">
    <div class="panel trained">
      <div class="phead">TRAINED policy <span class="dot full"></span></div>
      <div class="row"><span>moving</span><b id="t-moving">0</b></div>
      <div class="row"><span>stopped / jam</span><b id="t-jam">0</b></div>
      <div class="row"><span>crashed</span><b id="t-crash">0</b></div>
      <div class="row hi"><span>trips done</span><b id="t-trips">0</b></div>
    </div>
    <div class="panel untrained">
      <div class="phead">UNTRAINED (today) <span class="dot shadow"></span></div>
      <div class="row"><span>moving</span><b id="u-moving">0</b></div>
      <div class="row"><span>stopped / jam</span><b id="u-jam">0</b></div>
      <div class="row"><span>crashed</span><b id="u-crash">0</b></div>
      <div class="row hi"><span>trips done</span><b id="u-trips">0</b></div>
    </div>
  </div>

  <div id="controls">
    <button id="play">⏸ Pause</button>
    <label class="seg" title="which worlds to show">
      <select id="view">
        <option value="both">Both (overlay)</option>
        <option value="trained">Trained only</option>
        <option value="untrained">Untrained only</option>
      </select>
    </label>
    <input id="scrub" type="range" min="0" max="100" value="0" />
    <span id="clock" class="mono">t=0.0s</span>
    <label class="chk"><input type="checkbox" id="trails" checked /> trails</label>
    <label class="chk"><input type="checkbox" id="roads" checked /> roads</label>
  </div>

  <div id="err" hidden></div>

  <script src="config.js" onerror="window.__noConfig=true"></script>
  <script src="carmesh.js"></script>
  <script src="app.js"></script>
</body>
</html>
